<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Status Tracker CBPET</title>
  <!-- Load React, ReactDOM, and Babel from CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load Tailwind CSS from CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom font for a clean look */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

  <!-- The root element where the React application will be rendered -->
  <div id="root"></div>

  <!-- The custom modals for a better user experience (instead of alert) -->
  <div id="error-modal" class="fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 hidden">
    <div class="flex items-center justify-center min-h-screen">
      <div class="bg-white dark:bg-gray-800 p-8 m-4 rounded-lg shadow-xl max-w-sm w-full text-center">
        <h3 class="text-xl font-bold mb-4 text-red-600">Validation Error</h3>
        <p class="text-gray-700 dark:text-gray-300 mb-6">Please fill out all fields before submitting.</p>
        <button
          onclick="document.getElementById('error-modal').classList.add('hidden')"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg shadow-lg hover:bg-blue-700 transition duration-200"
        >
          OK
        </button>
      </div>
    </div>
  </div>
  
  <div id="no-data-modal" class="fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 hidden">
    <div class="flex items-center justify-center min-h-screen">
      <div class="bg-white dark:bg-gray-800 p-8 m-4 rounded-lg shadow-xl max-w-sm w-full text-center">
        <h3 class="text-xl font-bold mb-4 text-red-600">Download Error</h3>
        <p class="text-gray-700 dark:text-gray-300 mb-6">There is no data to download yet. Please submit an entry first.</p>
        <button
          onclick="document.getElementById('no-data-modal').classList.add('hidden')"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg shadow-lg hover:bg-blue-700 transition duration-200"
        >
          OK
        </button>
      </div>
    </div>
  </div>

  <!-- Daily Summary/Congratulations Modal -->
  <div id="daily-summary-modal" class="fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 hidden">
    <div class="flex items-center justify-center min-h-screen">
      <div class="bg-white dark:bg-gray-800 p-8 m-4 rounded-lg shadow-xl max-w-lg w-full text-center">
        <h3 id="daily-summary-title" class="text-xl font-bold mb-4 text-blue-600">Daily Submission Summary</h3>
        <p id="total-completed-work" class="text-gray-700 dark:text-gray-300 mb-2"></p>
        <p id="total-hours-logged" class="text-gray-700 dark:text-gray-300 mb-2"></p>
        <p id="daily-target-achieved" class="text-gray-700 dark:text-gray-300 mb-6"></p>
        <p id="daily-summary-message" class="text-gray-700 dark:text-gray-300 mb-6 font-semibold"></p>
        <button
          onclick="document.getElementById('daily-summary-modal').classList.add('hidden')"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg shadow-lg hover:bg-blue-700 transition duration-200"
        >
          Close
        </button>
      </div>
    </div>
  </div>
  
  <!-- The main React application code -->
  <script type="text/babel">
    const { useState } = React;
    const App = () => {
      // State for the form inputs
      const [titleName, setTitleName] = useState('');
      const [completedPages, setCompletedPages] = useState('');
      const [taskType, setTaskType] = useState('');
      const [estimatedTime, setEstimatedTime] = useState('');
      const [takenTime, setTakenTime] = useState('');
      
      // State for the list of submitted status updates
      const [statusEntries, setStatusEntries] = useState([]);

      // Define standard targets for each task type
      const standardTargets = {
          'Prestyle': 900,
          'Preedit': 300,
          'FL Validation': 600,
          'Revises Validation': 1200,
          'Normalisation': 300,
          'Cast-off XML Conversion': 4,
          'Ref Edit': 400,
          'Style Editing': 80,
      };

      // Define the units for each task type's target
      const standardTargetUnits = {
          'Prestyle': 'pages/day',
          'Preedit': 'pages/day',
          'FL Validation': 'pages/day',
          'Revises Validation': 'pages/day',
          'Normalisation': 'pages/day',
          'Cast-off XML Conversion': 'titles/day',
          'Ref Edit': 'references/day',
          'Style Editing': 'pages/day',
      };

      // Assume standard workday is 8 hours for calculation
      const STANDARD_WORK_HOURS_PER_DAY = 8;

      // Motivational message for not achieving target
      const MOTIVATIONAL_MESSAGE = "Keep Trying!";

      // Calculate percentages dynamically for individual entry display
      const timeAchievedPercentage = estimatedTime > 0 && takenTime > 0
        ? ((estimatedTime / takenTime) * 100).toFixed(2)
        : 0;
      
      const targetAchievedPercentage = (taskType && standardTargets[taskType] > 0 && takenTime > 0)
        ? ((completedPages / (standardTargets[taskType] / STANDARD_WORK_HOURS_PER_DAY * takenTime)) * 100).toFixed(2)
        : 0;

      // Handle form submission
      const handleSubmit = (e) => {
        e.preventDefault();

        // Check if required fields are filled
        if (!titleName || !completedPages || !taskType || !estimatedTime || !takenTime) {
          document.getElementById('error-modal').classList.remove('hidden');
          return;
        }

        // Determine achievement status with motivational message
        const achievementStatus = targetAchievedPercentage >= 100 ? 'Achieved' : MOTIVATIONAL_MESSAGE;

        // Create a new entry object
        const newEntry = {
          id: Date.now(),
          date: new Date().toLocaleDateString(),
          titleName: titleName,
          completedPages: Number(completedPages),
          taskType: taskType,
          estimatedTime: Number(estimatedTime),
          takenTime: Number(takenTime),
          timeAchieved: timeAchievedPercentage,
          targetAchieved: targetAchievedPercentage,
          status: achievementStatus,
        };

        // Add the new entry to the list
        setStatusEntries([...statusEntries, newEntry]);

        // Reset the form fields
        setTitleName('');
        setCompletedPages('');
        setTaskType('');
        setEstimatedTime('');
        setTakenTime('');
      };

      // Function to handle clearing the submission history
      const handleClearHistory = () => {
        setStatusEntries([]); // Clears all entries
      };

      // Function to handle "Complete Submission for Today"
      const handleCompleteDailySubmission = () => {
        const today = new Date().toLocaleDateString();
        const dailyEntries = statusEntries.filter(entry => entry.date === today);

        if (dailyEntries.length === 0) {
          document.getElementById('no-data-modal').classList.remove('hidden');
          return;
        }

        let totalCompletedWork = 0;
        let totalTakenTime = 0;
        let sumOfWeightedTargetAchievement = 0; // Sum of (individual_target_achieved * taken_time)

        dailyEntries.forEach(entry => {
          totalCompletedWork += entry.completedPages;
          totalTakenTime += entry.takenTime;

          // Calculate individual effective standard work units for weighted average
          const individualStandardTarget = standardTargets[entry.taskType] || 0;
          if (individualStandardTarget > 0) {
            // How many "standard 8-hour work units" this completed work represents
            const equivalentEightHourWorkUnits = (entry.completedPages / individualStandardTarget) * STANDARD_WORK_HOURS_PER_DAY;
            sumOfWeightedTargetAchievement += (equivalentEightHourWorkUnits / entry.takenTime) * 100 * entry.takenTime;
          }
        });

        // Calculate cumulative daily target achieved percentage (weighted average)
        const dailyTargetAchieved = totalTakenTime > 0
          ? (sumOfWeightedTargetAchievement / totalTakenTime).toFixed(2)
          : 0;

        // Update modal content
        document.getElementById('total-completed-work').textContent = `Total Work Completed Today: ${totalCompletedWork} items`;
        document.getElementById('total-hours-logged').textContent = `Total Hours Logged Today: ${totalTakenTime} hours`;
        document.getElementById('daily-target-achieved').textContent = `Daily Target Achieved: ${dailyTargetAchieved}%`;

        const dailySummaryMessageElement = document.getElementById('daily-summary-message');
        if (dailyTargetAchieved >= 100) {
          dailySummaryMessageElement.textContent = "Fantastic work! You hit your cumulative daily target! 🎉";
          dailySummaryMessageElement.className = "text-green-600 dark:text-green-400 mb-6 font-bold";
          document.getElementById('daily-summary-title').textContent = "Daily Achievement!";
          document.getElementById('daily-summary-title').className = "text-xl font-bold mb-4 text-green-600";
        } else {
          dailySummaryMessageElement.textContent = `You're at ${dailyTargetAchieved}% of your daily target. ${MOTIVATIONAL_MESSAGE}`;
          dailySummaryMessageElement.className = "text-red-600 dark:text-red-400 mb-6 font-bold";
          document.getElementById('daily-summary-title').textContent = "Daily Summary";
          document.getElementById('daily-summary-title').className = "text-xl font-bold mb-4 text-blue-600";
        }

        document.getElementById('daily-summary-modal').classList.remove('hidden');
      };

      

      // Function to handle the CSV download
      const handleDownloadCSV = () => {
        if (statusEntries.length === 0) {
          document.getElementById('no-data-modal').classList.remove('hidden');
          return;
        }

        // Create the CSV header
        const headers = [
          "Date",
          "Title Name",
          "Task Type",
          "Completed Work",
          "Estimated Time (hours)",
          "Taken Time (hours)",
          "Time Achieved (%)",
          "Target Achieved (%)",
          "Status"
        ];

        // Map the data to CSV rows
        const rows = statusEntries.map(entry => [
          entry.date,
          entry.titleName,
          entry.taskType,
          entry.completedPages,
          entry.estimatedTime,
          entry.takenTime,
          entry.timeAchieved,
          entry.targetAchieved,
          entry.status
        ]);

        // Calculate cumulative data for CSV footer
        let totalCompletedWorkCumulative = 0;
        let totalTakenTimeCumulative = 0;
        let sumOfWeightedTargetAchievementCumulative = 0;

        statusEntries.forEach(entry => {
          totalCompletedWorkCumulative += entry.completedPages;
          totalTakenTimeCumulative += entry.takenTime;

          const individualStandardTarget = standardTargets[entry.taskType] || 0;
          if (individualStandardTarget > 0) {
            const equivalentEightHourWorkUnits = (entry.completedPages / individualStandardTarget) * STANDARD_WORK_HOURS_PER_DAY;
            sumOfWeightedTargetAchievementCumulative += (equivalentEightHourWorkUnits / entry.takenTime) * 100 * entry.takenTime;
          }
        });

        const cumulativeTargetAchieved = totalTakenTimeCumulative > 0
          ? (sumOfWeightedTargetAchievementCumulative / totalTakenTimeCumulative).toFixed(2)
          : 0;
        
        const cumulativeStatus = cumulativeTargetAchieved >= 100 ? 'Achieved' : MOTIVATIONAL_MESSAGE;

        // Add cumulative row to CSV
        rows.push([
          "Cumulative Total",
          "", // Title Name empty for cumulative
          "", // Task Type empty for cumulative
          totalCompletedWorkCumulative,
          "", // Estimated Time empty for cumulative
          totalTakenTimeCumulative,
          "", // Time Achieved empty for cumulative
          cumulativeTargetAchieved,
          cumulativeStatus
        ]);

        // Combine headers and rows
        const csvContent = [
          headers.join(','),
          ...rows.map(row => row.join(','))
        ].join('\n');

        // Create a Blob from the CSV content
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);

        // Create a temporary link and trigger the download
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', 'daily_status_report.csv');
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // Clean up the URL
        URL.revokeObjectURL(url);
      };

      // Render the component
      return (
        <div className="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-inter p-4">
          <div className="container mx-auto p-6 md:p-10 bg-white dark:bg-gray-800 rounded-2xl shadow-xl">
            <header className="text-center mb-10">
              <h1 className="text-4xl md:text-5xl font-extrabold text-blue-600 dark:text-blue-400">Daily Status Tracker CBPET</h1>
              <p className="mt-2 text-lg md:text-xl text-gray-600 dark:text-gray-300">Log your progress and track your achievements.</p>
            </header>

            {/* Status Entry Form Section */}
            <div className="flex flex-col md:flex-row gap-8">
              <div className="w-full md:w-1/2">
                <h2 className="text-2xl font-bold mb-4 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="mr-2 text-blue-500 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                    <path d="M12 2v4" />
                    <path d="M12 6h8" />
                    <path d="M8 6h4" />
                    <path d="M8 10h8" />
                    <path d="M8 14h8" />
                  </svg>
                  New Status Entry
                </h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                  {/* Title Name */}
                  <div>
                    <label className="block text-sm font-medium mb-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="inline mr-1 text-purple-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                      </svg>
                      Title Name
                    </label>
                    <input
                      type="text"
                      value={titleName}
                      onChange={(e) => setTitleName(e.target.value)}
                      className="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                      placeholder="e.g., Project Alpha Book 1"
                      required
                    />
                  </div>
                  {/* Completed Work */}
                  <div>
                    <label className="block text-sm font-medium mb-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="inline mr-1 text-green-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-8.08" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                      </svg>
                      Completed Work (Pages/Titles/References)
                    </label>
                    <input
                      type="number"
                      value={completedPages}
                      onChange={(e) => setCompletedPages(e.target.value)}
                      className="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                      placeholder="e.g., 180 pages, 2 titles, 350 references"
                      required
                    />
                  </div>

                  {/* Type of Task Performed */}
                  <div>
                    <label className="block text-sm font-medium mb-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="inline mr-1 text-purple-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                        <path d="M10 9h4" />
                        <path d="M10 13h4" />
                        <path d="M10 17h4" />
                      </svg>
                      Type of Task Performed
                    </label>
                    <select
                      value={taskType}
                      onChange={(e) => setTaskType(e.target.value)}
                      className="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                      required
                    >
                      <option value="" disabled>Select a task</option>
                      <option value="Prestyle">Prestyle</option>
                      <option value="Preedit">Preedit</option>
                      <option value="Normalisation">Normalisation</option>
                      <option value="Cast-off XML Conversion">Cast-off XML Conversion</option>
                      <option value="FL Validation">FL Validation</option>
                      <option value="Revises Validation">Revises Validation</option>
                      <option value="Ref Edit">Ref Edit</option>
                      <option value="Style Editing">Style Editing</option>
                    </select>
                    {/* Conditional display for standard targets */}
                    {taskType && standardTargets[taskType] && (
                        <p className="mt-2 text-xs text-gray-500 dark:text-gray-400">
                          Standard target (8 hours): {standardTargets[taskType]} {standardTargetUnits[taskType]}
                        </p>
                    )}
                  </div>

                  {/* Estimated Time */}
                  <div>
                    <label className="block text-sm font-medium mb-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="inline mr-1 text-orange-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                      </svg>
                      Estimated Time (hours)
                    </label>
                    <input
                      type="number"
                      value={estimatedTime}
                      onChange={(e) => setEstimatedTime(e.target.value)}
                      className="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                      placeholder="e.g., 8"
                      required
                    />
                  </div>

                  {/* Taken Time */}
                  <div>
                    <label className="block text-sm font-medium mb-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="inline mr-1 text-teal-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                      </svg>
                      Taken Time (hours)
                    </label>
                    <input
                      type="number"
                      value={takenTime}
                      onChange={(e) => setTakenTime(e.target.value)}
                      className="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                      placeholder="e.g., 7.5"
                      required
                    />
                  </div>

                  <button
                    type="submit"
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition duration-200 focus:outline-none focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-700"
                  >
                    Save Status
                  </button>
                </form>
              </div>

              {/* Real-time Metrics and History Section */}
              <div className="w-full md:w-1/2">
                <h2 className="text-2xl font-bold mb-4 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="mr-2 text-blue-500 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="1" y="10" width="4" height="12" rx="1" />
                    <rect x="8" y="6" width="4" height="16" rx="1" />
                    <rect x="15" y="14" width="4" height="8" rx="1" />
                    <rect x="22" y="2" width="4" height="20" rx="1" />
                  </svg>
                  Daily Summary
                </h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                  {/* Target Achieved Card (based on standard target and actual time) */}
                  <div className="p-5 rounded-lg shadow-md bg-gray-50 dark:bg-gray-700 border-l-4 border-l-green-500">
                    <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400">Target Achieved (Current Entry)</h3>
                    <div className="flex items-center justify-between mt-1">
                      <p className="text-3xl font-extrabold text-green-600 dark:text-green-400">
                        {targetAchievedPercentage}%
                      </p>
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 text-green-400 dark:text-green-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-8.08" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                      </svg>
                    </div>
                  </div>

                  {/* Time Achieved Card */}
                  <div className="p-5 rounded-lg shadow-md bg-gray-50 dark:bg-gray-700 border-l-4 border-l-purple-500">
                    <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400">Time Achieved (Efficiency)</h3>
                    <div className="flex items-center justify-between mt-1">
                      <p className="text-3xl font-extrabold text-purple-600 dark:text-purple-400">
                        {timeAchievedPercentage}%
                      </p>
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 text-purple-400 dark:text-purple-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                      </svg>
                    </div>
                  </div>
                </div>

                {/* History Table */}
                <h3 className="text-xl font-bold mb-4 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="mr-2 text-blue-500 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 21.5a9.5 9.5 0 1 0-7.05-3.05" />
                    <path d="M12 21.5V12h-9.5" />
                    <path d="M12 12h-9.5" />
                    <path d="M12 12V2.5" />
                    <path d="M12 12L16 15" />
                    <path d="M12 12L8 9" />
                  </svg>
                  Submission History
                </h3>
                {statusEntries.length > 0 ? (
                  <>
                    <div className="overflow-x-auto rounded-lg shadow-md mb-4">
                      <table className="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead className="bg-gray-200 dark:bg-gray-700">
                          <tr>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Date</th>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Title Name</th>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Task Type</th>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Target %</th>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Time %</th>
                            <th className="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Target Status</th>
                          </tr>
                        </thead>
                        <tbody className="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                          {statusEntries.map((entry) => (
                            <tr key={entry.id} className="hover:bg-gray-100 dark:hover:bg-gray-700 transition duration-150">
                              <td className="px-6 py-4 whitespace-nowrap text-sm font-medium">{entry.date}</td>
                              <td className="px-6 py-4 whitespace-nowrap text-sm">{entry.titleName}</td>
                              <td className="px-6 py-4 whitespace-nowrap text-sm">{entry.taskType}</td>
                              <td className="px-6 py-4 whitespace-nowrap text-sm">
                                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${entry.targetAchieved >= 100 ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'} dark:bg-opacity-20`}>
                                  {entry.targetAchieved}%
                                </span>
                              </td>
                              <td className="px-6 py-4 whitespace-nowrap text-sm">
                                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${entry.timeAchieved >= 100 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} dark:bg-opacity-20`}>
                                  {entry.timeAchieved}%
                                </span>
                              </td>
                              <td className="px-6 py-4 whitespace-nowrap text-sm">
                                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${entry.status === 'Achieved' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} dark:bg-opacity-20`}>
                                  {entry.status}
                                </span>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="flex flex-col sm:flex-row justify-between mt-4 space-y-2 sm:space-y-0 sm:space-x-4">
                      <button
                        onClick={handleDownloadCSV}
                        className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition duration-200 focus:outline-none focus:ring-4 focus:ring-green-300 dark:focus:ring-green-700"
                      >
                        Download CSV
                      </button>
                      <button
                        onClick={handleClearHistory}
                        className="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition duration-200 focus:outline-none focus:ring-4 focus:ring-red-300 dark:focus:ring-red-700"
                      >
                        Clear History
                      </button>
                      <button
                        onClick={handleCompleteDailySubmission}
                        className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition duration-200 focus:outline-none focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-700"
                      >
                        Complete Submission for Today
                      </button>
                      
                    </div>
                  </>
                ) : (
                  <div className="p-6 text-center text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-700 rounded-lg shadow-md">
                    No entries submitted yet.
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
